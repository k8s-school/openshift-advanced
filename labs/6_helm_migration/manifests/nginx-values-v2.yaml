# Step 2: OpenShift restricted-v2 SCC compatible
# - ClusterIP: no LoadBalancer quota (services.loadbalancers=0 on Developer Portal)
# - containerPort 8080: non-privileged port, no root needed
# - openShiftConfig: mounts nginx.conf with pid/temp dirs in /tmp + listen 8080
# - securityContext: runAsNonRoot, no privilege escalation, all capabilities dropped
service:
  type: ClusterIP
  port: 8080

containerPort: 8080

openShiftConfig: true

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault
