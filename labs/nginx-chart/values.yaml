# Default values — will fail on Red Hat Developer Portal and OpenShift:
#   service.type: LoadBalancer  → quota services.loadbalancers=0
#   containerPort: 80           → requires root, blocked by restricted-v2 SCC
image:
  registry: ""
  repository: nginx
  tag: "1.25.3"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: LoadBalancer
  port: 80

containerPort: 80

podSecurityContext: {}

securityContext: {}

# Mount a custom nginx.conf (required for port 8080 + /tmp paths on OpenShift)
openShiftConfig: false

# Enable Alpine sidecar (used in airgapped labs to verify multi-image mirror)
mirror: false

sidecar:
  image:
    repository: alpine
    tag: "3.19"
    pullPolicy: IfNotPresent
